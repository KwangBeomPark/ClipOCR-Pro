; ══════════════════════════════════════════════════════════════
; Screen Clip Tool - Configuration File (설정 파일)
; ══════════════════════════════════════════════════════════════
; 이 파일에서 앱의 주요 동작 상수를 외부에서 관리할 수 있습니다.
; You can customize the app's core behavior by editing values below.
; ──────────────────────────────────────────────────────────────

[UI]
; 최소화(축소) 시 창 크기 (px) / Minimized clip window size in pixels
MINI_SIZE=80

; 최소화(축소) 시 투명도 (0=완전투명 ~ 255=불투명) / Opacity when minimized (0=transparent, 255=opaque)
MINI_OPACITY=128

; 캡처 창 테두리 두께 (px) / Border width of clip windows in pixels
BORDER_WIDTH=3

[Behavior]
; 실행 취소(Undo) 최대 저장 횟수 / Maximum number of undo steps
UNDO_MAX=5
